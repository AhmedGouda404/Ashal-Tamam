<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تمام Portal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap');
:root{
  --green:#4CAF50;--green-dark:#2E7D32;--green-light:#81C784;
  --green-bg:#E8F5E9;--green-bg2:#C8E6C9;--green-text:#1B5E20;
  --green-mid:#388E3C;--green-hover:#43A047;
  --bg:#F1F8E9;--surface:#FFFFFF;
  --border:#C8E6C9;--border2:#A5D6A7;
  --text:#1B5E20;--text2:#388E3C;--text3:#81C784;
  --red:#C62828;--red-bg:#FFEBEE;--red-text:#C62828;
  --amber-bg:#FFF8E1;--amber-text:#F57F17;
  --radius:10px;--radius-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}

.login-page{width:100%;max-width:900px;min-height:500px;background:var(--surface);border-radius:20px;overflow:hidden;display:flex;box-shadow:0 20px 60px rgba(46,125,50,.15);}
.login-left{width:40%;background:var(--green-dark);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 30px;position:relative;overflow:hidden;}
.login-right{flex:1;padding:48px 40px;display:flex;flex-direction:column;justify-content:center;}
.tamam-logo{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.tamam-logo-text{font-size:32px;font-weight:700;color:var(--green-dark);letter-spacing:-1px;}
.tamam-logo-dot{width:8px;height:8px;border-radius:50%;background:var(--green);}
.login-subtitle{font-size:13px;color:var(--text2);margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border);}
.lg{margin-bottom:14px;}
.ll{font-size:11px;color:var(--text2);margin-bottom:5px;font-weight:500;}
.li{width:100%;padding:10px 14px;font-size:14px;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-family:inherit;}
.li:focus{outline:none;border-color:var(--green);}
.login-btn{width:100%;padding:12px;background:var(--green-dark);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;}
.login-btn:hover{background:var(--green-mid);}
.err-msg{background:#FFF3E0;border:1px solid #FFB74D;border-radius:var(--radius);padding:10px;font-size:12px;color:#E65100;margin-top:10px;display:none;}
.err-msg.show{display:block;}

.app-wrap{width:100%;max-width:480px;display:none;flex-direction:column;}
.phone{background:var(--surface);border-radius:24px;overflow:hidden;box-shadow:0 20px 60px rgba(46,125,50,.12);display:flex;flex-direction:column;min-height:700px;}
.topbar{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--green-dark);color:#fff;}
.tb-left{display:flex;align-items:center;gap:10px;}
.avatar{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;}
.logout-btn{font-size:11px;background:rgba(255,255,255,0.15);border:none;color:#fff;padding:5px 10px;border-radius:6px;cursor:pointer;}
.screen{display:none;flex:1;flex-direction:column;}
.screen.on{display:flex;}
.scroll{flex:1;overflow-y:auto;padding:16px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
.badge{padding:3px 10px;border-radius:99px;font-size:10px;font-weight:600;}
.ba{background:var(--green-bg);color:var(--green-text);}
.bp{background:var(--amber-bg);color:var(--amber-text);}
.br{background:var(--red-bg);color:var(--red-text);}
.nav{display:flex;border-top:1px solid var(--border);padding:10px;}
.nb{flex:1;background:none;border:none;font-size:10px;color:var(--text2);cursor:pointer;padding:10px;}
.nb.on{color:var(--green-dark);font-weight:600;}
</style>
</head>
<body>

<div id="login-page" class="login-page">
  <div class="login-left">
    <div style="color:white;text-align:center;">
      <h2>تمام</h2>
      <p style="font-size:12px;opacity:0.7;">Portal System</p>
    </div>
  </div>
  <div class="login-right">
    <div class="tamam-logo"><div class="tamam-logo-text">تمام</div><div class="tamam-logo-dot"></div></div>
    <div class="login-subtitle">Ashal Holding — Sales System</div>
    
    <div class="lg">
      <label class="ll">Username</label>
      <input class="li" id="ln" placeholder="AS2026">
    </div>
    <div class="lg">
      <label class="ll">Password</label>
      <input class="li" id="lp" type="password" placeholder="1234">
    </div>
    
    <div class="err-msg" id="login-err"></div>
    <button class="login-btn" onclick="doLogin()" id="login-btn">Login</button>
  </div>
</div>

<div id="app-wrap" class="app-wrap">
  <div class="phone">
    <div class="topbar">
      <div class="tb-left"><div class="avatar" id="av"></div><div id="tb-t">Portal</div></div>
      <button class="logout-btn" onclick="location.reload()">Logout</button>
    </div>
    <div id="sc-list" class="screen on"><div class="scroll" id="list-body"></div></div>
    <div id="sc-dash" class="screen"><div class="scroll" id="dash-body">Dashboard Area</div></div>
    <div class="nav" id="main-nav">
      <button class="nb on" onclick="showScreen('sc-list')">Clients</button>
      <button class="nb" onclick="showScreen('sc-dash')">Dashboard</button>
    </div>
  </div>
</div>

<script>
const CONFIG = {
  usersListName: 'DF Users',
  clientsListName: 'Sales_Clients'
};

let currentUser = null;
let allClients = [];

// الاتصال المباشر بـ Vercel Serverless Function
async function callApi(action, list, item = null, filter = null, id = null) {
  try {
    const res = await fetch('/api/sharepoint', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, list, item, filter, id })
    });
    
    if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
    return await res.json();
  } catch (e) {
    console.error("API Error:", e);
    return { ok: false, error: e.message };
  }
}

async function doLogin() {
  const username = document.getElementById('ln').value.trim();
  const password = document.getElementById('lp').value.trim();
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-err');

  if (!username || !password) {
    errEl.textContent = "Please enter username and password.";
    errEl.classList.add('show');
    return;
  }

  btn.textContent = 'Authenticating...';
  btn.disabled = true;
  errEl.classList.remove('show');

  const res = await callApi('get', CONFIG.usersListName, null, `UserName eq '${username}' and Password eq '${password}'`);

  if (res.ok && res.data && res.data.length > 0) {
    const u = res.data[0];
    currentUser = u.SalesName || u.UserName;
    
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('app-wrap').style.display = 'flex';
    document.getElementById('av').textContent = currentUser.charAt(0);
    loadClients();
  } else {
    errEl.textContent = res.error ? `Server Error: ${res.error}` : "Invalid username or password!";
    errEl.classList.add('show');
    btn.textContent = 'Login';
    btn.disabled = false;
  }
}

async function loadClients() {
  const listBody = document.getElementById('list-body');
  listBody.innerHTML = "<div style='text-align:center; padding:20px; color:#666;'>Loading clients...</div>";

  const res = await callApi('get', CONFIG.clientsListName);

  if (res.ok) {
    allClients = res.data;
    renderList();
  } else {
    listBody.innerHTML = `<div style='color:red;'>Failed to load data: ${res.error}</div>`;
  }
}

function renderList() {
  const listBody = document.getElementById('list-body');
  if (allClients.length === 0) {
    listBody.innerHTML = "<div style='text-align:center; color:#888;'>No clients found.</div>";
    return;
  }
  
  let html = '';
  allClients.forEach(c => {
    const statusClass = c.Status === 'Approved' ? 'ba' : c.Status === 'Rejected' ? 'br' : 'bp';
    html += `
      <div class="card">
        <div style="display:flex; justify-content:space-between;">
          <b>${c.CustomerName || c.Title || 'Unnamed Client'}</b>
          <span class="badge ${statusClass}">${c.Status || 'Pending'}</span>
        </div>
        <div style="font-size:12px; color:#666; margin-top:5px;">Program: ${c.Program || 'N/A'}</div>
      </div>`;
  });
  listBody.innerHTML = html;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  event.currentTarget.classList.add('on');
}
</script>
</body>
</html>
